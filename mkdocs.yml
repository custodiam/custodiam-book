site_name: Custodiam
site_url: https://docs.custodiam.es/
site_description: >-
  Documentación pública del proyecto Custodiam — sistema multiplataforma de
  gestión para agrupaciones de Protección Civil.
site_author: Equipo Custodiam (Rodrigo Mulero, Marcos Val Sanz)
copyright: >-
  Copyright &copy; 2026 Equipo Custodiam &middot;
  <a href="https://github.com/custodiam/custodiam-book/blob/main/LICENSE">AGPL-3.0</a>

repo_name: custodiam/custodiam-book
repo_url: https://github.com/custodiam/custodiam-book
edit_uri: edit/main/docs/

theme:
  name: material
  language: es
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Cambiar a modo claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: blue grey
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Cambiar al modo del sistema
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/custodiam
      name: Organización Custodiam en GitHub
  generator: false

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - es
  - d2
  - mermaid2:
      version: 11.4.1

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Enlace permanente a este título
      toc_depth: 2
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Inicio: index.md
  - Empezar:
      - empezar/index.md
      - Backend (API): empezar/api.md
      - App (Flutter): empezar/app.md
      - Infraestructura: empezar/infra.md
      - Usuarios de prueba: empezar/usuarios-prueba.md
  - Arquitectura:
      - arquitectura/index.md
      - Stack técnico: arquitectura/stack.md
      - Diagrama del sistema: arquitectura/diagramas.md
      - Modelo de datos: arquitectura/modelo-datos.md
      - Flujos de negocio: arquitectura/flujos-negocio.md
      - Notificaciones redundantes: arquitectura/notificaciones.md
      - Audit log: arquitectura/audit-log.md
  - ADRs:
      - adrs/index.md
      - ADR-001 Polyrepo: adrs/adr-001-polyrepo.md
      - ADR-002 SQLModel: adrs/adr-002-sqlmodel.md
      - ADR-003 Alembic: adrs/adr-003-alembic.md
      - ADR-004 Cliente HTTP Flutter: adrs/adr-004-http-cliente.md
      - ADR-005 sqflite: adrs/adr-005-sqflite.md
      - ADR-006 Nginx Alpine: adrs/adr-006-nginx-alpine.md
      - ADR-007 GHCR: adrs/adr-007-ghcr.md
      - ADR-008 psycopg3: adrs/adr-008-psycopg3.md
      - ADR-009 2 BDs separadas: adrs/adr-009-2-bds-separadas.md
      - ADR-010 OAuth + PKCE + Keycloak: adrs/adr-010-oauth-pkce-keycloak.md
      - ADR-011 Deep links: adrs/adr-011-deep-links.md
      - ADR-012 Riverpod: adrs/adr-012-riverpod.md
      - ADR-013 RBAC lockstep: adrs/adr-013-rbac-lockstep.md
      - ADR-014 Result<T> + Failure: adrs/adr-014-result-failure.md
      - ADR-015 EnvConfig: adrs/adr-015-env-config.md
      - ADR-016 dev.log: adrs/adr-016-dev-log.md
      - ADR-017 SplashPage + AppStartup: adrs/adr-017-splash-app-startup.md
      - ADR-018 Design System: adrs/adr-018-design-system.md
      - ADR-019 sops + age: adrs/adr-019-sops-age.md
      - ADR-020 Tres modos de despliegue: adrs/adr-020-tres-modos-despliegue.md
      - ADR-021 SMTP Resend: adrs/adr-021-smtp-resend.md
      - ADR-022 iOS 15 mínimo: adrs/adr-022-ios-15.md
      - ADR-023 OAuth web vs móvil: adrs/adr-023-oauth-web-asimetria.md
      - ADR-024 Patrol E2E: adrs/adr-024-patrol-e2e.md
      - ADR-025 Modelo extensible: adrs/adr-025-modelo-extensible.md
      - ADR-026 uv: adrs/adr-026-uv.md
      - ADR-027 MkDocs + Pages: adrs/adr-027-mkdocs-pages.md
  - Guías:
      - guias/index.md
      - Docker Compose local: guias/docker-compose-local.md
      - Configuración de Keycloak: guias/configuracion-keycloak.md
      - Setup FastAPI con uv: guias/setup-fastapi-uv.md
      - Cliente OIDC en Flutter: guias/flutter-oidc.md
  - Contribuir:
      - contribuir/index.md
